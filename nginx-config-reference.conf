# XYZ Corp API - Nginx Configuration
# File ini untuk reference di development.
# Di Ubuntu Server, akan disimpan di: /etc/nginx/sites-available/xyz-corp-api

# XYZ Corp API - Nginx Reverse Proxy Configuration

upstream xyz_corp_app {
    server localhost:3000;
}

server {
    listen 80;
    server_name _;
    
    # Logging
    access_log /var/log/nginx/xyz-corp-api-access.log combined;
    error_log /var/log/nginx/xyz-corp-api-error.log;
    
    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Health check endpoint
    location /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }
    
    # Proxy requests to Node.js app
    location / {
        proxy_pass http://xyz_corp_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # Block direct access to sensitive files
    location ~ /\. {
        deny all;
    }
    
    location ~ ~$ {
        deny all;
    }
}
